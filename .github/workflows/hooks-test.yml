name: Hook Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  hook-behavior:
    name: Hook Behavior Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: pip install pytest

      - name: Run hook test harness
        run: bash scripts/test-hooks.sh

      - name: Run pytest for hook-related tests
        run: python -m pytest tests/test_settings_hooks.py -v
