name: Python Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          sudo apt-get update -y && sudo apt-get install -y shellcheck

      - name: Lint
        run: make lint

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # pyyaml is required by test/validators/test_workflow_config.py, which
          # parses the benchmark workflow YAML. The old CI subset skipped it;
          # the full suite includes it.
          pip install pytest pyyaml

      - name: Run full pytest suite
        run: python -m pytest test/validators/ -v