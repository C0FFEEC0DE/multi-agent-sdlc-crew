name: Hook Contracts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  hook-contracts:
    name: Hook Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: pip install pytest

      - name: Run isolated hook cases
        run: bash scripts/test-hooks.sh

      - name: Run shared-state hook scenarios
        run: bash scripts/test-hooks.sh tests/hooks/scenarios.json

      - name: Run hook-related pytest checks
        run: python -m pytest tests/test_settings_hooks.py tests/test_hook_scenarios.py -v
