name: Security Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM

jobs:
  security-scan:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Scan for secrets
      run: |
        echo "=== Scanning for secrets ==="

        # Check for common secret patterns
        ERRORS=0

        # Password patterns
        if grep -r -i "password\s*=\s*['\"][^'\"]+['\"]" --include="*.py" --include="*.js" --include="*.ts" --include="*.json" --include="*.yaml" --include="*.yml" --include="*.sh" . 2>/dev/null | grep -v "example\|test\|dummy\|placeholder"; then
          echo "❌ Found potential hardcoded passwords"
          ERRORS=$((ERRORS + 1))
        fi

        # API keys
        if grep -r -i "api_key\|apikey\|api-key" --include="*.py" --include="*.js" --include="*.ts" --include="*.json" --include="*.yaml" --include="*.yml" . 2>/dev/null | grep -E "(=|:)\s*['\"][a-zA-Z0-9]{16,}['\"]" | grep -v "example\|test\|dummy"; then
          echo "❌ Found potential API keys"
          ERRORS=$((ERRORS + 1))
        fi

        # AWS credentials
        if grep -r "AKIA[0-9A-Z]{16}" --include="*.py" --include="*.js" --include="*.ts" --include="*.json" . 2>/dev/null; then
          echo "❌ Found AWS Access Key ID"
          ERRORS=$((ERRORS + 1))
        fi

        # Private keys
        if grep -r "BEGIN RSA PRIVATE KEY\|BEGIN OPENSSH PRIVATE KEY\|BEGIN EC PRIVATE KEY" --include="*.py" --include="*.js" --include="*.ts" --include="*.pem" --include="*.key" . 2>/dev/null; then
          echo "❌ Found private keys"
          ERRORS=$((ERRORS + 1))
        fi

        # .env files in git
        if git ls-files | grep -E "^\.env" | grep -v "\.env\.example"; then
          echo "❌ Found .env files tracked in git"
          ERRORS=$((ERRORS + 1))
        fi

        # Bearer tokens
        if grep -r "Bearer [a-zA-Z0-9_\-]*\.[a-zA-Z0-9_\-]*\.[a-zA-Z0-9_\-]*" --include="*.py" --include="*.js" --include="*.ts" . 2>/dev/null | grep -v "example\|test"; then
          echo "❌ Found potential JWT tokens"
          ERRORS=$((ERRORS + 1))
        fi

        if [ $ERRORS -eq 0 ]; then
          echo "✅ No secrets found"
        else
          echo "❌ Found $ERRORS potential security issues"
          exit 1
        fi

    - name: Check for sensitive file permissions
      run: |
        echo "=== Checking file permissions ==="

        # Check for executable scripts that shouldn't be
        find . -name "*.py" -perm /111 -type f 2>/dev/null | head -5

        echo "✅ File permissions check complete"

    - name: Validate JSON files
      run: |
        echo "=== Validating JSON files ==="

        for file in $(find . -name "*.json" -type f | grep -v node_modules); do
          if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
            echo "❌ Invalid JSON: $file"
            exit 1
          fi
        done

        echo "✅ All JSON files valid"
