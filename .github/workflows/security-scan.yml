name: Security Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM

permissions:
  contents: read

jobs:
  security-scan:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Resolve TruffleHog base
      id: resolve-base
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
        elif [ "${{ github.event_name }}" = "push" ]; then
          echo "base=$(git rev-parse HEAD~1 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
        else
          echo "base=" >> "$GITHUB_OUTPUT"
        fi

    - name: Scan for secrets with TruffleHog
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ steps.resolve-base.outputs.base }}
        head: HEAD
        extra_args: --only-verified

    - name: Check for sensitive file permissions
      run: |
        echo "=== Checking file permissions ==="

        # Check for executable source scripts that shouldn't be (the repo is
        # Node-only: .mjs/.js/.sh sources should not carry the executable bit).
        find . \( -name "*.mjs" -o -name "*.js" -o -name "*.sh" \) -perm /111 -type f 2>/dev/null | head -5

        echo "File permissions check complete"

    - name: Validate JSON files
      run: |
        echo "=== Validating JSON files ==="

        # Node-stdlib JSON validation — the repo runs no Python tooling in CI.
        mapfile -t json_files < <(find . -name "*.json" -type f | grep -v node_modules)
        node -e '
          const fs = require("node:fs");
          let bad = 0;
          for (const f of process.argv.slice(1)) {
            try { JSON.parse(fs.readFileSync(f, "utf-8")); }
            catch (e) { console.error("Invalid JSON: " + f); bad++; }
          }
          if (bad) process.exit(1);
        ' "${json_files[@]}"

        echo "All JSON files valid"
