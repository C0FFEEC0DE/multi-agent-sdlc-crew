name: Behavior Benchmark

on:
  push:
  workflow_dispatch:
    inputs:
      task_glob:
        description: "Task glob relative to repository root"
        required: false
        default: "bench/tasks/lite/*.json"
        type: string
      max_turns:
        description: "Maximum Claude Code turns per task"
        required: false
        default: "8"
        type: string
      timeout_seconds:
        description: "Per-task Claude timeout in seconds"
        required: false
        default: "240"
        type: string
      max_output_tokens:
        description: "Claude Code max output tokens per request"
        required: false
        default: "1024"
        type: string
      max_recovered_tasks:
        description: "Optional strict-mode cap for recovered tasks; leave empty to report only"
        required: false
        default: ""
        type: string
      max_summary_repaired_tasks:
        description: "Optional strict-mode cap for summary-repaired tasks; leave empty to report only"
        required: false
        default: ""
        type: string

jobs:
  benchmark:
    name: Behavioral Claude Code Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: behavior-benchmark-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve benchmark config
        id: cfg
        shell: bash
        env:
          INPUT_TASK_GLOB: ${{ inputs.task_glob }}
          INPUT_MAX_TURNS: ${{ inputs.max_turns }}
          INPUT_TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
          INPUT_MAX_OUTPUT_TOKENS: ${{ inputs.max_output_tokens }}
          INPUT_MAX_RECOVERED_TASKS: ${{ inputs.max_recovered_tasks }}
          INPUT_MAX_SUMMARY_REPAIRED_TASKS: ${{ inputs.max_summary_repaired_tasks }}
          VAR_OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          VAR_BENCHMARK_TIMEOUT_SECONDS: ${{ vars.BEHAVIOR_BENCHMARK_TIMEOUT_SECONDS }}
          VAR_BENCHMARK_MAX_OUTPUT_TOKENS: ${{ vars.BEHAVIOR_BENCHMARK_MAX_OUTPUT_TOKENS }}
          VAR_BENCHMARK_MAX_RECOVERED_TASKS: ${{ vars.BEHAVIOR_BENCHMARK_MAX_RECOVERED_TASKS }}
          VAR_BENCHMARK_MAX_SUMMARY_REPAIRED_TASKS: ${{ vars.BEHAVIOR_BENCHMARK_MAX_SUMMARY_REPAIRED_TASKS }}
        run: |
          task_glob="${INPUT_TASK_GLOB:-bench/tasks/lite/*.json}"
          max_turns="${INPUT_MAX_TURNS:-8}"
          model="${VAR_OLLAMA_MODEL:-}"
          timeout_seconds="${INPUT_TIMEOUT_SECONDS:-${VAR_BENCHMARK_TIMEOUT_SECONDS:-240}}"
          max_output_tokens="${INPUT_MAX_OUTPUT_TOKENS:-${VAR_BENCHMARK_MAX_OUTPUT_TOKENS:-1024}}"
          max_recovered_tasks="${INPUT_MAX_RECOVERED_TASKS:-${VAR_BENCHMARK_MAX_RECOVERED_TASKS:-}}"
          max_summary_repaired_tasks="${INPUT_MAX_SUMMARY_REPAIRED_TASKS:-${VAR_BENCHMARK_MAX_SUMMARY_REPAIRED_TASKS:-}}"

          if [ -z "$model" ]; then
            echo "OLLAMA_MODEL GitHub Actions variable is required" >&2
            exit 1
          fi

          echo "task_glob=$task_glob" >> "$GITHUB_OUTPUT"
          echo "max_turns=$max_turns" >> "$GITHUB_OUTPUT"
          echo "model=$model" >> "$GITHUB_OUTPUT"
          echo "timeout_seconds=$timeout_seconds" >> "$GITHUB_OUTPUT"
          echo "max_output_tokens=$max_output_tokens" >> "$GITHUB_OUTPUT"
          echo "max_recovered_tasks=$max_recovered_tasks" >> "$GITHUB_OUTPUT"
          echo "max_summary_repaired_tasks=$max_summary_repaired_tasks" >> "$GITHUB_OUTPUT"

      - name: Install Claude Code CLI and pytest
        shell: bash
        run: |
          node --version
          npm --version
          python3 --version
          npm install -g @anthropic-ai/claude-code
          python3 -m pip install --upgrade pip pytest
          claude --version

      - name: Install Claude configuration
        shell: bash
        run: |
          bash ./install.sh

      - name: Run behavioral benchmark
        shell: bash
        env:
          BENCH_RUNNER_CMD: python3 "$GITHUB_WORKSPACE/scripts/bench_runner_claude_code.py"
          BENCH_SOURCE_REF: ${{ github.ref }}
          TASK_GLOB: ${{ steps.cfg.outputs.task_glob }}
          MAX_TURNS: ${{ steps.cfg.outputs.max_turns }}
          BENCH_FAIL_FAST: "1"
          CLAUDE_TIMEOUT_SECONDS: ${{ steps.cfg.outputs.timeout_seconds }}
          CLAUDE_CODE_MAX_OUTPUT_TOKENS: ${{ steps.cfg.outputs.max_output_tokens }}
          OLLAMA_MODEL: ${{ steps.cfg.outputs.model }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          ANTHROPIC_BASE_URL: https://ollama.com
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.OLLAMA_API_KEY }}
          ANTHROPIC_API_KEY: ""
        run: |
          if [ -z "${OLLAMA_API_KEY:-}" ]; then
            echo "OLLAMA_API_KEY secret is required" >&2
            exit 1
          fi
          bash scripts/run-benchmark.sh \
            --output-dir bench-output \
            --mode command \
            --task-glob "$TASK_GLOB" \
            --ref "${GITHUB_REF}"

      - name: Render benchmark summary
        if: always()
        shell: bash
        env:
          MAX_RECOVERED_TASKS: ${{ steps.cfg.outputs.max_recovered_tasks }}
          MAX_SUMMARY_REPAIRED_TASKS: ${{ steps.cfg.outputs.max_summary_repaired_tasks }}
        run: |
          if [ -f bench-output/summary.json ]; then
            max_recovered_display="${MAX_RECOVERED_TASKS:-report-only}"
            max_summary_repaired_display="${MAX_SUMMARY_REPAIRED_TASKS:-report-only}"
            {
              echo "## Behavior Benchmark"
              echo ""
              echo "- Model: \`${{ steps.cfg.outputs.model }}\`"
              echo "- Max turns: \`${{ steps.cfg.outputs.max_turns }}\`"
              echo "- Timeout seconds: \`${{ steps.cfg.outputs.timeout_seconds }}\`"
              echo "- Max output tokens: \`${{ steps.cfg.outputs.max_output_tokens }}\`"
              echo "- Max recovered tasks allowed: \`${max_recovered_display}\`"
              echo "- Max summary-repaired tasks allowed: \`${max_summary_repaired_display}\`"
              jq -r '
                def pct($value): (($value * 1000 | round) / 10 | tostring) + "%";
                "- Task glob: `${{ steps.cfg.outputs.task_glob }}`",
                "- Configured tasks: `\(.totals.configured_tasks)`",
                "- Executed tasks: `\(.totals.executed_tasks)`",
                "- Execution coverage: \(pct(.rates.execution_coverage_rate))",
                "- Clean pass rate: \(pct(.rates.clean_pass_rate))",
                "- Recovered task rate: \(pct(.rates.recovered_task_rate))",
                "- Summary repair rate: \(pct(.rates.summary_repair_rate))",
                "",
                "| Task | Status | Changed Files | Notes |",
                "| --- | --- | --- | --- |",
                (.tasks[] | "| `\(.task_id)` | `\(.status)` | \((.changed_files // []) | join(", ")) | \(.notes | gsub("\n"; " ") | .[0:180]) |"),
                "",
                "- Pass rate: \(pct(.rates.task_pass_rate))",
                "- Clean pass rate: \(pct(.rates.clean_pass_rate))",
                "- Verification pass rate: \(pct(.rates.verification_pass_rate))",
                "- Review compliance: \(pct(.rates.review_compliance_rate))",
                "- Docs compliance: \(pct(.rates.docs_compliance_rate))",
                "- Recovered tasks: `\(.totals.recovered_tasks)`",
                "- Summary repaired tasks: `\(.totals.summary_repaired)`",
                (
                  [.tasks[] | select(.status != "passed") | "- `\(.task_id)`: \((.failures // []) | join(", ")) | \(.notes | gsub("\n"; " ") | .[0:220])"] as $failed
                  | [.tasks[] | select((.recovered_nonzero_exit == true) or ((.summary_repaired_by // "none") != "none")) | "- `\(.task_id)`: recovered=\(.recovered_nonzero_exit // false), summary_repaired_by=`\(.summary_repaired_by // "none")`, exit=`\(.claude_exit_code)` | \(.notes | gsub("\n"; " ") | .[0:220])"] as $recovered
                  | if ($failed | length) > 0 then
                      "",
                      "### Failed Tasks",
                      "",
                      ($failed[])
                    else empty end,
                    if ($recovered | length) > 0 then
                      "",
                      "### Recovered Tasks",
                      "",
                      ($recovered[])
                    else
                      empty
                    end
                )
              ' bench-output/summary.json
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enforce benchmark gate
        shell: bash
        env:
          BENCH_MAX_RECOVERED_TASKS: ${{ steps.cfg.outputs.max_recovered_tasks }}
          BENCH_MAX_SUMMARY_REPAIRED_TASKS: ${{ steps.cfg.outputs.max_summary_repaired_tasks }}
        run: |
          bash scripts/assert-benchmark-summary.sh bench-output/summary.json

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: behavior-benchmark-${{ github.run_id }}
          path: |
            bench-output/summary.json
            bench-output/tasks/**/result.json
            bench-output/tasks/**/claude-result.json
            bench-output/tasks/**/claude-result.txt
            bench-output/tasks/**/claude-debug.log
            bench-output/tasks/**/claude-stderr.log
            bench-output/tasks/**/claude-stderr-tail.txt
            bench-output/tasks/**/workspace.patch
            bench-output/tasks/**/changed-files.json
            bench-output/tasks/**/task-prompt.txt
            bench-output/tasks/**/task-summary.txt
            bench-output/tasks/**/runner-error.txt
