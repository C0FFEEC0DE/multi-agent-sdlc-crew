name: Hook Contracts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  hook-contracts:
    name: Hook Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Run Node hook fixture runner (cases + scenarios)
        run: node scripts/test-hooks.mjs

      - name: Run hook-related Node checks
        run: node --test test/unit/settings-hooks.test.mjs